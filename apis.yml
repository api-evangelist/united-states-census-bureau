- aid: united-states-census-bureau:tigerweb-rest-api
  name: TIGERweb GeoServices REST API
  description: The TIGERweb GeoServices REST API provides access to Census Bureau geographic data including boundaries for
    states, counties, census tracts, block groups, and other geographic entities. Supports standard ArcGIS REST API queries
    for geographic features.
  image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
  humanURL: https://tigerweb.geo.census.gov/tigerwebmain/TIGERweb_main.html
  baseURL: https://tigerweb.geo.census.gov/arcgis/rest/services
  tags:
