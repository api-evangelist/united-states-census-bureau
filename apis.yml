aid: united-states-census-bureau
name: United States Census Bureau
description: The U.S. Census Bureau is the nation's leading provider of quality data about its people and economy. The Census
  Bureau has been rolling out datasets via APIs, providing programmatic access to demographic, economic, housing, and social
  statistics. The Census Data API supports queries across datasets including the American Community Survey, Decennial Census,
  Population Estimates, County Business Patterns, Economic Census, and International Trade, with data available at national,
  state, county, tract, and block group geographic levels.
