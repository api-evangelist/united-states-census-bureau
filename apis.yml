apis:
- aid: united-states-census-bureau:census-data-api
  name: Census Data API
  description: The Census Data API provides programmatic access to statistical data from Census Bureau surveys and datasets.
    Users can query demographic, economic, housing, and social data by geographic level and filter using hundreds of statistical
    variables. Datasets include the American Community Survey (ACS), Decennial Census, Population Estimates, County Business
    Patterns, Economic Census, International Trade, and more.
  image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
  humanURL: https://www.census.gov/data/developers.html
