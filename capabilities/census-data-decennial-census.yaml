naftiko: 1.0.0-alpha2
info:
  label: Census Data API — Decennial Census
  description: 'Census Data API — Decennial Census. 1 operations. Lead operation: Get Decennial Census Redistricting Data
    (P.L. 94-171). Self-contained Naftiko capability covering one United States Census Bureau business surface.'
  tags:
  - United States Census Bureau
  - Decennial Census
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    UNITED_STATES_CENSUS_BUREAU_API_KEY: UNITED_STATES_CENSUS_BUREAU_API_KEY
capability:
  consumes:
  - type: http
    namespace: census-data-decennial-census
    baseUri: https://api.census.gov/data
    description: Census Data API — Decennial Census business capability. Self-contained, no shared references.
    resources:
    - name: year-dec-pl
      path: /{year}/dec/pl
      operations:
      - name: getdecennialpl
        method: GET
        description: Get Decennial Census Redistricting Data (P.L. 94-171)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: year
          in: path
          type: integer
          description: Census year (2020 or 2010)
          required: true
        - name: get
          in: query
          type: string
          description: Variable names (e.g., P1_001N for total population)
          required: true
        - name: for
          in: query
          type: string
          description: Geographic level and FIPS filter
        - name: in
          in: query
          type: string
          description: Parent geography constraint
        - name: key
          in: query
          type: string
          description: Census API key
  exposes:
  - type: rest
    namespace: census-data-decennial-census-rest
    port: 8080
    description: REST adapter for Census Data API — Decennial Census. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/{year}/dec/pl
      name: year-dec-pl
      description: REST surface for year-dec-pl.
      operations:
      - method: GET
        name: getdecennialpl
        description: Get Decennial Census Redistricting Data (P.L. 94-171)
        call: census-data-decennial-census.getdecennialpl
        with:
          year: rest.year
          get: rest.get
          for: rest.for
          in: rest.in
          key: rest.key
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: census-data-decennial-census-mcp
    port: 9090
    transport: http
    description: MCP adapter for Census Data API — Decennial Census. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: get-decennial-census-redistricting-data
      description: Get Decennial Census Redistricting Data (P.L. 94-171)
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: census-data-decennial-census.getdecennialpl
      with:
        year: tools.year
        get: tools.get
        for: tools.for
        in: tools.in
        key: tools.key
      outputParameters:
      - type: object
        mapping: $.
