naftiko: 1.0.0-alpha2
info:
  label: Census Data API — Economic Census
  description: 'Census Data API — Economic Census. 1 operations. Lead operation: Get Economic Census Data. Self-contained
    Naftiko capability covering one United States Census Bureau business surface.'
  tags:
  - United States Census Bureau
  - Economic Census
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    UNITED_STATES_CENSUS_BUREAU_API_KEY: UNITED_STATES_CENSUS_BUREAU_API_KEY
capability:
  consumes:
  - type: http
    namespace: census-data-economic-census
    baseUri: https://api.census.gov/data
    description: Census Data API — Economic Census business capability. Self-contained, no shared references.
    resources:
    - name: year-ecnbasic
      path: /{year}/ecnbasic
      operations:
      - name: geteconomiccensus
        method: GET
        description: Get Economic Census Data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: year
          in: path
          type: integer
          description: Economic Census year (2002, 2007, 2012, 2017, 2022)
          required: true
        - name: get
          in: query
          type: string
          description: Variable names to retrieve
          required: true
        - name: for
          in: query
          type: string
          description: Geographic level and FIPS filter
        - name: in
          in: query
          type: string
          description: Parent geography constraint
        - name: key
          in: query
          type: string
          description: Census API key
  exposes:
  - type: rest
    namespace: census-data-economic-census-rest
    port: 8080
    description: REST adapter for Census Data API — Economic Census. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/{year}/ecnbasic
      name: year-ecnbasic
      description: REST surface for year-ecnbasic.
      operations:
      - method: GET
        name: geteconomiccensus
        description: Get Economic Census Data
        call: census-data-economic-census.geteconomiccensus
        with:
          year: rest.year
          get: rest.get
          for: rest.for
          in: rest.in
          key: rest.key
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: census-data-economic-census-mcp
    port: 9090
    transport: http
    description: MCP adapter for Census Data API — Economic Census. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: get-economic-census-data
      description: Get Economic Census Data
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: census-data-economic-census.geteconomiccensus
      with:
        year: tools.year
        get: tools.get
        for: tools.for
        in: tools.in
        key: tools.key
      outputParameters:
      - type: object
        mapping: $.
