naftiko: 1.0.0-alpha2
info:
  label: Census Data API — Population Estimates
  description: 'Census Data API — Population Estimates. 1 operations. Lead operation: Get Population Estimates. Self-contained
    Naftiko capability covering one United States Census Bureau business surface.'
  tags:
  - United States Census Bureau
  - Population Estimates
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    UNITED_STATES_CENSUS_BUREAU_API_KEY: UNITED_STATES_CENSUS_BUREAU_API_KEY
capability:
  consumes:
  - type: http
    namespace: census-data-population-estimates
    baseUri: https://api.census.gov/data
    description: Census Data API — Population Estimates business capability. Self-contained, no shared references.
    resources:
    - name: year-pep-population
      path: /{year}/pep/population
      operations:
      - name: getpopulationestimates
        method: GET
        description: Get Population Estimates
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: year
          in: path
          type: integer
          description: Vintage year for the estimates
          required: true
        - name: get
          in: query
          type: string
          description: Variable names (e.g., NAME,POP,DATE_DESC for name, population, and date description)
          required: true
        - name: for
          in: query
          type: string
          description: Geographic level and FIPS filter
        - name: in
          in: query
          type: string
          description: Parent geography constraint
        - name: key
          in: query
          type: string
          description: Census API key
  exposes:
  - type: rest
    namespace: census-data-population-estimates-rest
    port: 8080
    description: REST adapter for Census Data API — Population Estimates. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/{year}/pep/population
      name: year-pep-population
      description: REST surface for year-pep-population.
      operations:
      - method: GET
        name: getpopulationestimates
        description: Get Population Estimates
        call: census-data-population-estimates.getpopulationestimates
        with:
          year: rest.year
          get: rest.get
          for: rest.for
          in: rest.in
          key: rest.key
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: census-data-population-estimates-mcp
    port: 9090
    transport: http
    description: MCP adapter for Census Data API — Population Estimates. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: get-population-estimates
      description: Get Population Estimates
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: census-data-population-estimates.getpopulationestimates
      with:
        year: tools.year
        get: tools.get
        for: tools.for
        in: tools.in
        key: tools.key
      outputParameters:
      - type: object
        mapping: $.
